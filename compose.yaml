services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-myfi}
      POSTGRES_USER: ${DB_USER:-myfi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-myfi} -d ${DB_NAME:-myfi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: manifold.omni.dev/omnidotdev/myfi-api:latest
    environment:
      DATABASE_URL: postgres://${DB_USER:-myfi}:${DB_PASSWORD}@db:5432/${DB_NAME:-myfi}
      PORT: "4000"
      CORS_ALLOWED_ORIGINS: "https://myfi.omni.dev"
      AUTH_JWKS_URL: ${AUTH_JWKS_URL}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  app:
    image: manifold.omni.dev/omnidotdev/myfi-app:latest
    environment:
      NODE_ENV: production
      PORT: "3000"
      VITE_API_URL: http://api:4000
      VITE_API_GRAPHQL_URL: http://api:4000/graphql
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  db_data:
